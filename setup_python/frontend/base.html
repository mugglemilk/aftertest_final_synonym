<!DOCTYPE html>
<html lang="th" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}คำพ้องความหมาย{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="{{ url_for('static', filename='synonym.css') }}">
    {% block styles %}{% endblock %}
</head>
<body>

<nav class="navbar"> 
  <a class="nav-brand" href="/">พ้องความหมาย</a>
  <div class="nav-links">
    <a href="/" class="nav-link {% block active_home %}{% endblock %}">ค้นหาคำพ้อง</a>
    <a href="/dictionary" class="nav-link {% block active_dict %}{% endblock %}">ตารางแสดงคำศัพท์</a>
    <a href="/poem" class="nav-link {% block active_poem %}{% endblock %}">แต่งกลอนแปด</a>
  </div>
  <button class="theme-btn" id="themeBtn" onclick="toggleTheme()"> 
    <span id="themeIcon">☀</span><span id="themeLabel">โหมดสว่าง</span>
  </button>
</nav>

<main>
    {% block content %}{% endblock %}
</main>

<script>
// สคริปต์จัดการ Theme เก็บไว้ที่นี่ที่เดียวเลย ทุกหน้าจะได้ใช้งานได้เหมือนกัน
function applyTheme(t) {
  document.documentElement.setAttribute('data-theme', t);
  const dark = t === 'dark';
  const icon = document.getElementById('themeIcon');
  const label = document.getElementById('themeLabel');
  if(icon) icon.textContent  = dark ? '☀' : '🌙';
  if(label) label.textContent = dark ? 'โหมดสว่าง' : 'โหมดมืด';
  localStorage.setItem('thai-theme', t);
}
function toggleTheme() {
  applyTheme(document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
}
applyTheme(localStorage.getItem('thai-theme') || 'dark');
</script>

{% block scripts %}{% endblock %}

</body>
</html>
